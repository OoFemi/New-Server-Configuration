- name: install apache2 and php packages
  tags: apache,httpd,php
  package:
    name:
      - "{{ apache_package_name))"
      - "{{ php_package_name }}"
    state: latest


- name: start and enable apache service
  tags: apache,httpd
  service:
     name: "{{ apache_service }}"
     state: started
     enabled: yes

- name: change email address for admin
  tags: apache, centos,httpd
  lineinfile:
    path: /etc/httpd/conf/httpd.conf
    regexp: '^ServerAdmin'
    line: ServerAdmin femifeel12@gmail.net
  when: ansible_distribution == "Centos"
  notify: restart_ apache

- name: copy html for new site
  tags: apache,apache2,httpd,apache
  copy:
     src: new_site.html
     dest:  /var/www/html/index.html
     owner: root
     group: root
     mode: 0644

