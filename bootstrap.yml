---

- hosts: all
  become: true
  tasks:


  - name: install update (CentOS)
    tags: always
    dnf:
      update_only: yes
      update_cache: yes
    when: ansible_distribution == "CentOS"
 
  - name: install updates(Ubuntu)
    tags: always
    apt:
      upgrade: dist
      update_cache: yes
    when: ansible_distribution == "Ubuntu"


- hosts: all
  become: true
  tasks:

  - name: create ansible_worker
    tags: always
    user:
      name: ansible_worker
      groups: root

  - name: add ssh key for user ansible_worker
    tags: always
    authorized_key:
      user: ansible_worker
      key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAILldvURLWbG3pRZgbXKyUXG8n3bXQCnleM0s2Vyp84oY ansible
"
 
  - name: add sudoer file  for ansible_worker
    tags: always
    copy:
      src: sudoer_ansible_worker
      dest: /etc/sudoers.d/ansible_worker
      owner: root
      group: root
      mode: 0440
