---

- hosts: all
  become: true
  tasks:


  - name: install updates(Centos)
    tags: always
    dnf:
      update_only: yes
      update_cache: yes
    when: ansible_distribution == "CentOS"
 
  - name: install updates(Ubuntu)
    tags: always
    apt:
      upgrade: dist
      update_cache: yes
    when: ansible_distribution == "Ubuntu"


- hosts: all
  become: true
  tasks:

  - name: create femi user
    tags: always
    user:
      name: femi
      groups: root

  - name: add ssh key for user femi
    tags: always
    authorized_key:
      user: femi
      key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAILldvURLWbG3pRZgbXKyUXG8n3bXQCnleM0s2Vyp84oY ansible
"
 
  - name: add sudoer file  for femi
    tags: always
    copy:
      src: sudoer_femi
      dest: /etc/sudoers.d/femi
      owner: root
      group: root
      mode: 0440
