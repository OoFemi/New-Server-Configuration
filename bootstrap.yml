---

- hosts: all
  become: true
  tasks:


  - name: install updates (Centos)
    tags: always
    dnf:
      update_only: yes
      update_cache: yes
    when: ansible_distribution == "CentOS"
 
  - name: install updates (Ubuntu)
    tags: always
    apt:
      upgrade: dist
      update_cache: yes
    when: ansible_distribution == "Ubuntu"


- hosts: all
  become: true
  tasks:


  - name: add ssh key for femi
    tags: always
    authorized_key:
      user: femi
      key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAILldvURLWbG3pRZgbXKyUXG8n3bXQCnleM0s2Vyp84oY ansible
"
 
-  hosts: Workstation
   become: true
   tasks:

   - name: install unzip
     package: 
       name: unzip


   - name: install Terraform
     unarchive:
         src: https://releases.hashicorp.com/terraform/1.14.8/terraform_1.14.8_linux_amd64.zip
         dest: /usr/local/bin
         remote_src: yes
         mode: 0755
         owner: root
         group: root    






- hosts: web_servers
  become: true
  tasks:


  - name: install apache2 and php packages for Ubuntu
    tags: apache, apache2,Ubuntu
    apt:
      name:
        - apache2
        - libapache2-mod-php
      state: latest
    when: ansible_distribution == "Ubuntu"



  - name: install apache and php  package for CentOS
    tags: apache, centos,httpd
    dnf:
      name:
       - httpd
       - php
      state: latest
    when: ansible_distribution == "CentOS"
 

  - name: start httpd (CentOS)
    tags: apache,centos,httpd
    service:
       name: httpd
       state: started
       enabled: yes
    when: ansible_distribution == "CentOS"


  - name: copy new website html for site
    tags: apache, apache2,httpd
    copy:
      src: new_site.html
      dest:  /var/www/html/index.html
      owner: root
      group: root
      mode: 0644


- hosts: db_servers
  become: true
  tasks:
 
  - name: install mariadb package (CentOS)
    tags: centos,db,mariadb
    dnf:
      name: mariadb
      state: latest
    when: ansible_distribution == "CentOS" 


  - name: install mariadb package (Ubuntu)
    tags: db,mariadb,ubuntu
    apt:
      name: mariadb-server
      state: latest
    when: ansible_distribution == "Ubuntu"


- hosts: file_servers
  become: true
  tasks:

  - name: install samba package 
    tags: Samba
    package:
      name: samba
      state: latest
   


 

